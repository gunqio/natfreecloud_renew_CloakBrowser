name: NAT签到

on:
  schedule:
    - cron: '20 4 * * *'
  workflow_dispatch:
    inputs:
      enable_recording:
        description: '是否录屏 (true=录屏 / false=不录屏)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  sign:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            xvfb ffmpeg curl unzip \
            fonts-noto-cjk \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 \
            libasound2t64 || sudo apt-get install -y -qq libasound2

      - name: 安装 Python 依赖
        run: |
          pip install -r requirements.txt
          python -c "from cloakbrowser import ensure_binary; ensure_binary()"

      # 从私有仓库下载签到脚本
      - name: 从私有仓库下载签到脚本
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          mkdir -p private_repo
          curl -L -H "Authorization: token $GH_TOKEN" \
            "https://raw.githubusercontent.com/gunqio/zhiyong/main/nat_sign_pydoll.py" \
            -o "private_repo/nat_sign_pydoll.py"
          
          echo "==== 脚本下载验证 ===="
          head -20 private_repo/nat_sign_pydoll.py

      - name: 下载并启动 Xray 代理
        env:
          V2RAY_CONFIG: ${{ secrets.V2RAY_CONFIG }}
        run: |
          curl -sL https://github.com/XTLS/Xray-core/releases/download/v25.5.16/Xray-linux-64.zip -o xray.zip
          unzip xray.zip && chmod +x xray
          echo "$V2RAY_CONFIG" > config.json
          ./xray run -c config.json &
          sleep 5
          echo "直连 IP："
          curl -s --max-time 5 ifconfig.me
          echo ""
          echo "代理 IP："
          curl -s --max-time 5 --socks5 127.0.0.1:10808 ifconfig.me
          echo ""

      - name: 运行脚本
        env:
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
          DISPLAY: ":99"
          LIBGL_ALWAYS_SOFTWARE: "1"
          GALLIUM_DRIVER: "llvmpipe"
          ENABLE_RECORDING: ${{ github.event.inputs.enable_recording || 'false' }}
        run: |
          Xvfb :99 -screen 0 1280x720x24 +extension RANDR &
          XVFB_PID=$!
          sleep 2
          DISPLAY=:99 xdpyinfo > /dev/null 2>&1 && echo "Xvfb 就绪" || echo "Xvfb 启动异常"

          RECORD_PID=""
          if [ "$ENABLE_RECORDING" = "true" ]; then
            echo "🎬 录屏已开启"
            ffmpeg -f x11grab -video_size 1280x720 -framerate 15 -i :99 \
              -codec:v libx264 -preset ultrafast -crf 28 \
              -pix_fmt yuv420p -movflags +faststart /tmp/recording.mp4 \
              > /tmp/ffmpeg.log 2>&1 &
            RECORD_PID=$!
            sleep 3
          else
            echo "⏭️ 录屏已跳过（定时任务默认不录屏）"
          fi

          # 运行私库脚本
          timeout 270 python private_repo/nat_sign_pydoll.py || echo "脚本退出码: $?"

          echo "=== 截图目录内容 ==="
          ls -la ./screenshots/ || echo "截图目录不存在"

          if [ -n "$RECORD_PID" ]; then
            sleep 2
            kill $RECORD_PID 2>/dev/null || true
            wait $RECORD_PID 2>/dev/null || true
            VIDEO_SIZE=$(stat -c%s /tmp/recording.mp4 2>/dev/null || echo 0)
            echo "录像文件大小: ${VIDEO_SIZE} bytes"
          fi

          kill $XVFB_PID 2>/dev/null || true

      - name: 上传截图和录屏
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-files
          path: |
            ./screenshots/*.png
            /tmp/recording.mp4
            /tmp/ffmpeg.log
          if-no-files-found: ignore
          retention-days: 3

      # Telegram 结果推送（全局执行完毕必触发）
      - name: Telegram 通知
        if: always()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          STATUS="✅ 执行成功"
          if [[ "${{ job.status }}" != "success" ]]; then
            STATUS="❌ 执行失败"
          fi
          TEXT="NAT签到任务 ${STATUS}
运行分支: ${{ github.ref_name }}
触发方式: ${{ github.event_name }}
运行编号: #${{ github.run_number }}
详情链接: ${{ github.run_url }}"
          
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT_ID}" \
            -d "text=${TEXT}"

      - name: 清理旧的 workflow runs（只保留最近 2 个）
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          WORKFLOW_ID="${{ github.workflow }}"

          echo "获取所有 runs..."
          RUN_IDS=$(gh run list \
            --repo "$REPO" \
            --workflow "$WORKFLOW_ID" \
            --limit 100 \
            --json databaseId \
            --jq '.[].databaseId')

          SKIP=2
          COUNT=0
          for RUN_ID in $RUN_IDS; do
            COUNT=$((COUNT + 1))
            if [ $COUNT -le $SKIP ]; then
              echo "保留 run #$RUN_ID"
            else
              echo "删除 run #$RUN_ID"
              gh run delete "$RUN_ID" --repo "$REPO" || true
            fi
          done
          echo "清理完成，共保留 ${SKIP} 个 run"
