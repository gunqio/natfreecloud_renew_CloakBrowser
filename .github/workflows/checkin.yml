name: NAT签到

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  sign:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          # CloakBrowser 自带 Chromium，只需要系统运行库 + 字体
          sudo apt-get install -y -qq \
            xvfb ffmpeg curl unzip \
            fonts-noto-cjk \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 \
            libasound2t64 || sudo apt-get install -y -qq libasound2

      - name: 安装 Python 依赖
        run: |
          pip install -r requirements.txt
          # 安装 CloakBrowser 自带的 stealth Chromium 二进制
          python -c "from cloakbrowser import ensure_binary; ensure_binary()"

      - name: 下载并启动 Xray 代理
        env:
          V2RAY_CONFIG: ${{ secrets.V2RAY_CONFIG }}
        run: |
          curl -sL https://github.com/XTLS/Xray-core/releases/download/v24.9.30/Xray-linux-64.zip -o xray.zip
          unzip xray.zip && chmod +x xray
          echo "$V2RAY_CONFIG" > config.json
          ./xray run -c config.json &
          sleep 5
          echo "直连 IP："
          curl -s --max-time 5 ifconfig.me
          echo ""
          echo "代理 IP："
          curl -s --max-time 5 --socks5 127.0.0.1:10808 ifconfig.me
          echo ""

      - name: 运行脚本 (带录屏)
        env:
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
          APP_TOKEN: ${{ secrets.APP_TOKEN }}
          WX_PUSHER_UID: ${{ secrets.WX_PUSHER_UID }}
          DISPLAY: ":99"
          LIBGL_ALWAYS_SOFTWARE: "1"
          GALLIUM_DRIVER: "llvmpipe"
        run: |
          # 启动 Xvfb 虚拟显示器（CloakBrowser headless=False 需要）
          Xvfb :99 -screen 0 1280x720x24 +extension RANDR &
          XVFB_PID=$!
          sleep 2
          DISPLAY=:99 xdpyinfo > /dev/null 2>&1 && echo "Xvfb 就绪" || echo "Xvfb 启动异常"

          # 启动录屏
          ffmpeg -f x11grab -video_size 1280x720 -framerate 15 -i :99 \
            -codec:v libx264 -preset ultrafast -crf 28 \
            -pix_fmt yuv420p -movflags +faststart /tmp/recording.mp4 \
            > /tmp/ffmpeg.log 2>&1 &
          RECORD_PID=$!
          sleep 3

          # 运行签到脚本
          timeout 270 python nat_sign_pydoll.py || echo "脚本退出码: $?"

          echo "=== 截图目录内容 ==="
          ls -la ./screenshots/ || echo "截图目录不存在"

          # 停止录屏
          sleep 2
          kill $RECORD_PID 2>/dev/null || true
          wait $RECORD_PID 2>/dev/null || true
          kill $XVFB_PID 2>/dev/null || true

          VIDEO_SIZE=$(stat -c%s /tmp/recording.mp4 2>/dev/null || echo 0)
          echo "录像文件大小: ${VIDEO_SIZE} bytes"

      - name: 上传截图和录屏
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-files
          path: |
            ./screenshots/*.png
            /tmp/recording.mp4
            /tmp/ffmpeg.log
          if-no-files-found: ignore
          retention-days: 3
